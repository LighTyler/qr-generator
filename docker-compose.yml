version: '3.8'

services:
  backend:
    env_file: .env
    build: ./backend
    restart: always
    volumes:
      - ./backend:/backend
      - ./backend/certs:/backend/certs:ro
    working_dir: /backend
    environment:
      - PYTHONPATH=src
      - POSTGRES_USER=${POSTGRES_USER:-myuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-mypassword}
      - POSTGRES_HOST=postgres  # ← Имя сервиса ниже
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_NAME=${POSTGRES_NAME:-mydb}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - APP_MODE=${APP_MODE:-development}
      - APP_NAME=${APP_NAME:-qr-pass-api}
      - APP_HOST=${APP_HOST:-0.0.0.0}
      - APP_PORT=${APP_PORT:-8000}
    command: sh -c "alembic upgrade head && uvicorn run:make_app --factory --host ${APP_HOST:-0.0.0.0} --port ${APP_PORT:-8000} --reload"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_net

  postgres:
    image: postgres:18-alpine
    restart: always
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_NAME:-mydb}
      - POSTGRES_USER=${POSTGRES_USER:-myuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-mypassword}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-myuser} -d ${POSTGRES_NAME:-mydb}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_net

networks:
  app_net:
    driver: bridge

volumes:
  postgres-data: