version: "3.8"

services:
  backend:
    env_file: .env
    build: ./backend
    restart: always
    volumes:
      - ./backend:/backend
      - ./backend/certs:/backend/certs:ro
    working_dir: /backend
    environment:
      - PYTHONPATH=src
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_NAME=${POSTGRES_NAME}
      - FRONTEND_URL=${FRONTEND_URL}
      - APP_MODE=${APP_MODE}
      - APP_NAME=${APP_NAME}
      - APP_HOST=${APP_HOST:-0.0.0.0}
      - APP_PORT=${APP_PORT:-8000}
    command: sh -c "alembic upgrade head && uvicorn run:make_app --factory --host ${APP_HOST:-0.0.0.0} --port ${APP_PORT:-8000} --reload"
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    # ✅ Удалено: rabbitmq, redis
    networks:
      - app_net

  postgres:
    env_file: .env
    image: postgres:18-alpine
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_NAME}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_net
    restart: always

networks:
  app_net:
    driver: bridge

volumes:
  postgres-data:
